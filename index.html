<!DOCTYPE html>
<html>
<head>
    <style>
        .content {
            background-color: rgb(20, 20, 20);
            padding: 10px;
        }
    </style>
</head>
<body style="text-align:center;font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;background-color: rgb(25,25,25);color:white">
    <h2>Farmhand Item Generator</h2>
   
    Registry Name: <input type="text" id="Registry" value="iron_sword">
    <p></p>
    Item Name: <input type="text" id="ItemName" value="Iron Greatsword">
    <p></p>
    Rarity: <select id="Rarity"><option value="Common">Common</option>
                                <option value="Uncommon">Uncommon</option>
                                <option value="Rare">Rare</option>
                                <option value="Very Rare">Very Rare</option>
                                <option value="Legendary">Legendary</option>
                                <option value="Quest">Quest</option>
    </select>
    <p></p>
    Health: <input type="number" id="Health" value="0">
    <select id="HpOperation"><option value="Addition/Subtraction">Addition/Subtraction</option>
                             <option value="Precentage">Precentage</option>
                             <option value="Multiplicative">Multiplicative</option>
    </select>
    <p></p>
    Armor: <input type="number" id="Armor" value="0">
    <select id="ArmorOperation"><option value="Addition/Subtraction">Addition/Subtraction</option>
                                <option value="Precentage">Precentage</option>
                                <option value="Multiplicative">Multiplicative</option>
    </select>
    <p></p>
    Attack Speed: <select id="AttackSpeed"><option value="Very Slow">Very Slow</option>
                                           <option value="Slow">Slow</option>
                                           <option value="Normal">Normal</option>
                                           <option value="Fast">Fast</option>
                                           <option value="Very Fast">Very Fast</option>
                                           <option value="Not Weapon">Not Weapon</option>
    </select>
    <p></p>
    Damage: <input type="number" id="Damage" value="12">
    <select id="DmgOperation"><option value="Addition/Subtraction">Addition/Subtraction</option>
                              <option value="Precentage">Precentage</option>
                              <option value="Multiplicative">Multiplicative</option>
    </select>
    <p></p>
    Movement Speed: <input type="number" id="MovementSpeed" value="0.05">
    <select id="MoveSpdOperation"><option value="Addition/Subtraction">Addition/Subtraction</option>
                                  <option value="Precentage">Precentage</option>
                                  <option value="Multiplicative">Multiplicative</option>
    </select>
    <p></p>
    Slot: <select id="Slot"><option value="mainhand">mainhand</option>
                            <option value="offhand">offhand</option>
                            <option value="feet">feet</option>
                            <option value="legs">legs</option>
                            <option value="chest">chest</option>
                            <option value="head">head</option>
                            <option value="No Slot">No Slot</option>
    </select>
    <p></p>
    Optional Lore: <input type="text" id="OptionalLore" value="lol cool sword">
    <p></p>
    Enchant glint?: <input type="checkbox" id="EnchantCheck">
    <p></p>
    Color for Leather Items (not implemented): <input id="r" type="number">
                             <input id="g" type="number">
                             <input id="b" type="number">
    <button type="button" id="setcolor" onclick="SetColor()">Set Color</button>
    <div class="content" id="Color"></div>
    <p></p>
    <button type="button" onclick="Generate()">Generate</button>
    <p id="final"></p>
    <button type="button" onclick="Copy()">Copy</button>

  
      
    <script>
        function rgb(r, g, b) {
            console.log(`rgb(${r}, ${g}, ${b});`);
            return `rgb(${r}, ${g}, ${b})`
        }
        function SetColor() {
            document.getElementById("Color").style.backgroundColor = rgb(document.getElementById('r').value,document.getElementById('g').value,document.getElementById('b').value)
        }
        function Copy() {
            navigator.clipboard.writeText(document.getElementById("final").innerHTML)
        }
        function Generate() {
            var Registry = document.getElementById("Registry").value;
            var Name = document.getElementById("ItemName").value;

            var Health = document.getElementById("Health").value;
            var HO = document.getElementById("HpOperation");
            var HOIndex = HO.selectedIndex;

            var Armor = document.getElementById("Armor").value;
            var AO = document.getElementById("ArmorOperation");
            var AOIndex = AO.selectedIndex;

            var Damage = document.getElementById("Damage").value;
            var DO = document.getElementById("DmgOperation");
            var DOIndex = DO.selectedIndex;

            var MovementSpeed = document.getElementById("MovementSpeed").value;
            var MSO = document.getElementById("MoveSpdOperation");
            var MSOIndex = MSO.selectedIndex;

            console.log(HOIndex)

            var R = document.getElementById("Rarity");
            var Rarity = R.options[R.selectedIndex].text;
            var S = document.getElementById("Slot");
            var Slot = S.options[S.selectedIndex].text;
            var A = document.getElementById("AttackSpeed");
            var AttackSpeed = A.options[A.selectedIndex].text;
            var OptionalLore = document.getElementById("OptionalLore").value;



            /*Pretty bad case function for name coloring*/
            if (Rarity=="Common") {
                var NameColor = "gray"
            }else if (Rarity=="Uncommon") {
                var NameColor = "light_purple"
            }else if (Rarity=="Rare") {
                var NameColor = "yellow"
            }else if (Rarity=="Very Rare") {
                var NameColor = "aqua"
            }else if (Rarity=="Legendary") {
                var NameColor = "red"
            }else if (Rarity=="Quest") {
                var NameColor = "gold"
            }


            if (AttackSpeed=="Very Slow") {
                var AttackSpeedNum = -3.4
            }else if (AttackSpeed=="Slow") {
                var AttackSpeedNum = -2.75
            }else if (AttackSpeed=="Normal") {
                var AttackSpeedNum = 0
            }else if (AttackSpeed=="Fast") {
                var AttackSpeedNum = 0.6
            }else if (AttackSpeed=="Very Fast") {
                var AttackSpeedNum = 1.2
            }else {
                var AttackSpeedNum = 0
            }

            /*slot lore*/
            if (Slot == "mainhand" && AttackSpeed == "Not Weapon") {
                ToolText = "Tool"
            }else if (Slot == "mainhand" && AttackSpeed != "Not Weapon") {
                ToolText = "Weapon"
            }
            if (Slot == "offhand") {
                ToolText = "Talisman"
            }
            if (Slot == "head") {
                ToolText = "Helmet"
            }
            if (Slot == "chest") {
                ToolText = "Chestplate"
            }
            if (Slot == "legs") {
                ToolText = "Leggings"
            }
            if (Slot == "feet") {
                ToolText = "Boots"
            }
            if (Slot == "No Slot") {
                ToolText = "Item"
            }

            /*checks attack speed to make sure it is a weapon*/
            if (AttackSpeed=="Not Weapon") {
                var Lore1 = `['{"text":"[`+Rarity+` `+ToolText+`]","color":"dark_green","bold":true,"italic":false}'`
                if (Slot!="No Slot") {
                    Lore1 = Lore1 + `,'{"text":" ","color":"blue","italic":false}'`
                }
            }else{
                var Lore1 = `['{"text":"[`+Rarity+` `+ToolText+`]","color":"dark_green","bold":true,"italic":false}','{"text":"`+Math.abs(Math.round((1.6+AttackSpeedNum)*Damage*10)/10)+` DPS","color":"blue","italic":false}','{"text":" ","color":"blue","italic":false}','{"text":"`+AttackSpeed+` Attack Speed","color":"gold","italic":false}'`
            }

            /*Finishes lore by running through stats & lore strings*/
            if (Health != 0 && HOIndex == 0) {
                Lore1 = Lore1 + `,'{"text":"Health +`+Health+`","color":"gold","bold":false,"italic":false}'`
            }else if (Health != 0 && HOIndex == 1) {
                if (Health <= 0) {
                    Lore1 = Lore1 + `,'{"text":"Health -%`+Math.abs(Health*100)+`","color":"gold","bold":false,"italic":false}'`
                } else {
                    Lore1 = Lore1 + `,'{"text":"Health +%`+Math.abs(Health*100)+`","color":"gold","bold":false,"italic":false}'`
                }
            }else if (Health != 0 && HOIndex == 2) {
                Lore1 = Lore1 + `,'{"text":"Health x`+Health+`","color":"gold","bold":false,"italic":false}'`
            }

            if (Armor != 0 && AOIndex == 0) {
                Lore1 = Lore1 + `,'{"text":"Armor +`+Armor+`","color":"gold","bold":false,"italic":false}'`
            }else if (Armor != 0 && AOIndex == 1) {
                if (Armor <= 0) {
                    Lore1 = Lore1 + `,'{"text":"Armor -%`+Math.abs(Armor*100)+`","color":"gold","bold":false,"italic":false}'`
                } else {
                    Lore1 = Lore1 + `,'{"text":"Armor +%`+Math.abs(Armor*100)+`","color":"gold","bold":false,"italic":false}'`
                }
            }else if (Armor != 0 && AOIndex == 2) {
                Lore1 = Lore1 + `,'{"text":"Armor x`+Armor+`","color":"gold","bold":false,"italic":false}'`
            }

            if (Damage != 0 && DOIndex == 0) {
                Lore1 = Lore1 + `,'{"text":"Damage +`+Damage+`","color":"gold","bold":false,"italic":false}'`
            }else if (Damage != 0 && DOIndex == 1) {
                if (Damage <= 0) {
                    Lore1 = Lore1 + `,'{"text":"Damage -%`+Math.abs(Damage*100)+`","color":"gold","bold":false,"italic":false}'`
                } else {
                    Lore1 = Lore1 + `,'{"text":"Damage +%`+Math.abs(Damage*100)+`","color":"gold","bold":false,"italic":false}'`
                }
            }else if (Damage != 0 && DOIndex == 2) {
                Lore1 = Lore1 + `,'{"text":"Damage x`+Damage+`","color":"gold","bold":false,"italic":false}'`
            }

            if (MovementSpeed != 0 && MSOIndex == 0) {
                Lore1 = Lore1 + `,'{"text":"Speed +`+MovementSpeed*10+`","color":"gold","bold":false,"italic":false}'`
            }else if (MovementSpeed != 0 && MSOIndex == 1) {
                if (MovementSpeed <= 0) {
                    Lore1 = Lore1 + `,'{"text":"Speed -%`+Math.abs(MovementSpeed*100)+`","color":"gold","bold":false,"italic":false}'`
                } else {
                    Lore1 = Lore1 + `,'{"text":"Speed +%`+Math.abs(MovementSpeed*100)+`","color":"gold","bold":false,"italic":false}'`
                }
            }else if (MovementSpeed != 0 && MSOIndex == 2) {
                Lore1 = Lore1 + `,'{"text":"Speed x`+MovementSpeed+`","color":"gold","bold":false,"italic":false}'`
            }

            if (OptionalLore){
                Lore1 = Lore1 + `,'{"text":" ","color":"gold","bold":false,"italic":false}','{"text":"\\\\\"`+OptionalLore+`\\\\\"","color":"dark_gray","bold":false,"italic":true}'`
            }

            Lore1 = Lore1 + ']}'
            if (document.getElementById("EnchantCheck").checked) {
                document.getElementById("final").innerHTML = `/give @p `+Registry+`{Enchantments:[{id:"minecraft:mending",lvl:1s}],HideFlags:127,Unbreakable:1b,display:{Name:'{"text":"`+Name+`","color":"`+NameColor+`","italic":false}',Lore:`+Lore1+`,AttributeModifiers:[{AttributeName:"generic.max_health",Name:"generic.max_health",Amount:`+Health+`,Operation:`+HOIndex+`,UUID:[I;`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`],Slot:"`+Slot+`"},{AttributeName:"generic.armor",Name:"generic.armor",Amount:`+Armor+`,Operation:`+AOIndex+`,UUID:[I;`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`],Slot:"`+Slot+`"},{AttributeName:"generic.attack_speed",Name:"generic.attack_speed",Amount:`+AttackSpeedNum+`,Operation:0,UUID:[I;`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`],Slot:"`+Slot+`"},{AttributeName:"generic.attack_damage",Name:"generic.attack_damage",Amount:`+Damage+`,Operation:`+DOIndex+`,UUID:[I;`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`],Slot:"`+Slot+`"},{AttributeName:"generic.movement_speed",Name:"generic.movement_speed",Amount:`+MovementSpeed+`,Operation:`+MSOIndex+`,UUID:[I;`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`],Slot:"`+Slot+`"}]} 1`;
            }else {
            document.getElementById("final").innerHTML = `/give @p `+Registry+`{HideFlags:127,Unbreakable:1b,display:{Name:'{"text":"`+Name+`","color":"`+NameColor+`","italic":false}',Lore:`+Lore1+`,AttributeModifiers:[{AttributeName:"generic.max_health",Name:"generic.max_health",Amount:`+Health+`,Operation:`+HOIndex+`,UUID:[I;`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`],Slot:"`+Slot+`"},{AttributeName:"generic.armor",Name:"generic.armor",Amount:`+Armor+`,Operation:`+AOIndex+`,UUID:[I;`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`],Slot:"`+Slot+`"},{AttributeName:"generic.attack_speed",Name:"generic.attack_speed",Amount:`+AttackSpeedNum+`,Operation:0,UUID:[I;`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`],Slot:"`+Slot+`"},{AttributeName:"generic.attack_damage",Name:"generic.attack_damage",Amount:`+Damage+`,Operation:`+DOIndex+`,UUID:[I;`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`],Slot:"`+Slot+`"},{AttributeName:"generic.movement_speed",Name:"generic.movement_speed",Amount:`+MovementSpeed+`,Operation:`+MSOIndex+`,UUID:[I;`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`,`+Math.round(Math.random(1)*1000000000)+`],Slot:"`+Slot+`"}]} 1`;
            }
        }
    </script>
</body>
  
</html>
